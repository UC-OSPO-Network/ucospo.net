[build.environment]
  NODE_VERSION = "20"

[build]
  publish = "_build/html"
  command = "npm ci && npx myst build --html && node scripts/generate-feed.js"

[context.deploy-preview]
  ignore = "false"

[[plugins]]
  package = "netlify-plugin-checklinks"
  [plugins.inputs]
    # mermaid.core-*.js causes a parse error in checklinks' JS analyzer (not a broken link)
    skipPatterns = ["mermaid", "cdnjs.cloudflare.com"]
